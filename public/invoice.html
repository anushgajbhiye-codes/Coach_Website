<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX | Payment Receipt</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --black: #0A0A0A;
  --dark: #111111;
  --dark2: #1A1A1A;
  --white: #FFFFFF;
  --gray3: #888888;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  line-height: 1.6;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.invoice-card {
  width: 100%;
  max-width: 650px;
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.25);
  box-shadow: 0 10px 45px rgba(0,0,0,0.85);
  border-radius: 4px;
  padding: 40px;
}
.invoice-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 24px;
  margin-bottom: 24px;
}
.brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 4px;
  color: var(--gold-light);
}
.title {
  text-align: right;
}
.title h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1.5px;
  color: var(--white);
}
.title p {
  font-size: 11px;
  color: var(--gray3);
  margin-top: 4px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 30px;
}
.meta-block h5 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold);
  margin-bottom: 8px;
}
.meta-block p {
  font-size: 13px;
  color: #dddddd;
  margin-bottom: 4px;
}
.table-wrap {
  width: 100%;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 2px;
  margin-bottom: 30px;
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 12px 16px;
  text-align: left;
  font-size: 13px;
}
th {
  background: rgba(255,255,255,0.02);
  color: var(--gold);
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
td {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: #eeeeee;
}
.total-section {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 20px;
  margin-bottom: 30px;
}
.total-line {
  display: flex;
  justify-content: space-between;
  width: 250px;
  font-size: 13px;
  color: #cccccc;
}
.total-line.grand {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 8px;
  margin-top: 4px;
}
.total-line.grand span {
  color: var(--gold-light);
}
.invoice-footer {
  text-align: center;
  font-size: 11px;
  color: var(--gray3);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 20px;
  display: flex;
  justify-content: center;
  gap: 16px;
}
.btn-print {
  background: var(--gold);
  color: var(--black);
  border: none;
  padding: 8px 18px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: 2px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-print:hover { opacity: 0.9; }
.btn-home {
  background: transparent;
  color: var(--gray3);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 18px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-radius: 2px;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-home:hover {
  border-color: var(--gold);
  color: var(--gold);
}
@media print {
  body { background: white; color: black; padding: 0; }
  .invoice-card { border: none; box-shadow: none; max-width: 100%; background: white; color: black; }
  .btn-print, .btn-home { display: none; }
  .brand, th, .meta-block h5, .total-line.grand span { color: black !important; }
  td, .meta-block p, .total-line { color: #333333 !important; }
}
</style>
</head>
<body>
<div class="invoice-card" id="invoiceCard">
  <div id="loadingState">
    <p style="text-align:center;color:var(--gray3);">Loading invoice details...</p>
  </div>
  <div id="invoiceContent" style="display:none;">
    <div class="invoice-header">
      <div>
        <div class="brand">APEX COACHING</div>
        <p style="font-size:12px;color:var(--gray3);margin-top:4px;" id="coachContact"></p>
      </div>
      <div class="title">
        <h1>Receipt</h1>
        <p id="receiptNumber"></p>
        <p id="receiptDate"></p>
      </div>
    </div>
    
    <div class="meta-grid">
      <div class="meta-block">
        <h5>Coach Details</h5>
        <p id="invoiceCoachName"></p>
        <p id="invoiceCoachGst" style="font-weight:600;color:var(--gold-light);"></p>
      </div>
      <div class="meta-block">
        <h5>Billed To</h5>
        <p id="invoiceClientName"></p>
        <p id="invoiceClientEmail"></p>
        <p id="invoiceClientPhone"></p>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th style="text-align:right;">Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td id="invoicePlanName"></td>
            <td style="text-align:right;" id="invoicePlanPrice"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="total-section">
      <div class="total-line" id="basePriceRow">
        <div>Subtotal</div>
        <div id="invoiceSubtotal"></div>
      </div>
      <div class="total-line" id="gstRow">
        <div id="gstRateLabel">GST (18%)</div>
        <div id="invoiceGst"></div>
      </div>
      <div class="total-line grand">
        <div>Total Paid</div>
        <div id="invoiceTotal"></div>
      </div>
    </div>

    <div class="invoice-footer">
      <button class="btn-print" onclick="window.print()">Print Receipt</button>
      <a href="/" class="btn-home">Back to Home</a>
    </div>
  </div>
</div>

<script>
async function loadInvoice() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    if (!orderId) {
      document.getElementById('loadingState').innerHTML = '<p style="color:red;text-align:center;">Order ID query parameter is missing.</p>';
      return;
    }

    const API_BASE = window.location.origin === 'null' || window.location.protocol === 'file:' ? 'http://localhost:5000' : '';
    const res = await fetch(API_BASE + `/api/payments/invoice/${orderId}`);
    if (!res.ok) throw new Error('Invoice data not found.');

    const data = await res.json();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('invoiceContent').style.display = 'block';

    // Populate data
    document.getElementById('coachContact').textContent = `${data.coachEmail} | ${data.coachPhone}`;
    document.getElementById('receiptNumber').textContent = `Receipt ID: REC-${data.payment.paymentId ? data.payment.paymentId.substring(4, 12).toUpperCase() : 'MOCK'}`;
    
    const pDate = new Date(data.payment.updatedAt);
    document.getElementById('receiptDate').textContent = pDate.toLocaleDateString('en-IN', {
      day: 'numeric',
      month: 'long',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    }) + ' (IST)';

    document.getElementById('invoiceCoachName').textContent = data.coachName;
    
    if (data.gstNumber) {
      document.getElementById('invoiceCoachGst').textContent = `GSTIN: ${data.gstNumber}`;
      document.getElementById('invoiceCoachGst').style.display = 'block';

      // GST breakdown (Inclusive of 18% GST)
      // Amount = Base + 18% GST => Base = Amount / 1.18
      const totalAmount = data.payment.amount;
      const baseAmount = Math.round(totalAmount / 1.18);
      const gstAmount = totalAmount - baseAmount;

      document.getElementById('invoicePlanName').textContent = `${data.planName} Coaching (Inclusive of GST)`;
      document.getElementById('invoicePlanPrice').textContent = `₹${baseAmount.toLocaleString('en-IN')}`;

      document.getElementById('invoiceSubtotal').textContent = `₹${baseAmount.toLocaleString('en-IN')}`;
      document.getElementById('gstRateLabel').textContent = 'GST (18% Inclusive)';
      document.getElementById('invoiceGst').textContent = `₹${gstAmount.toLocaleString('en-IN')}`;
      document.getElementById('invoiceTotal').textContent = `₹${totalAmount.toLocaleString('en-IN')}`;

      document.getElementById('basePriceRow').style.display = 'flex';
      document.getElementById('gstRow').style.display = 'flex';
    } else {
      document.getElementById('invoiceCoachGst').style.display = 'none';
      document.getElementById('invoicePlanName').textContent = `${data.planName} Coaching`;
      document.getElementById('invoicePlanPrice').textContent = `₹${data.payment.amount.toLocaleString('en-IN')}`;

      document.getElementById('basePriceRow').style.display = 'none';
      document.getElementById('gstRow').style.display = 'none';
      document.getElementById('invoiceTotal').textContent = `₹${data.payment.amount.toLocaleString('en-IN')}`;
    }

    document.getElementById('invoiceClientName').textContent = data.payment.clientName;
    document.getElementById('invoiceClientEmail').textContent = data.payment.clientEmail;
    document.getElementById('invoiceClientPhone').textContent = data.payment.clientPhone;

  } catch (error) {
    document.getElementById('loadingState').innerHTML = `<p style="color:red;text-align:center;">${error.message}</p>`;
  }
}
loadPolicy = loadInvoice; // mapping name standardizer
loadInvoice();
</script>
</body>
</html>
