<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX | Refund Policy</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --black: #0A0A0A;
  --dark: #111111;
  --dark2: #1A1A1A;
  --white: #FFFFFF;
  --gray3: #888888;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(201,168,76,0.2);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  line-height: 1.6;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.policy-container {
  width: 100%;
  max-width: 800px;
  background: var(--dark2);
  border: 1px solid var(--glass-border);
  box-shadow: 0 10px 45px rgba(0,0,0,0.8);
  border-radius: 4px;
  padding: 40px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 3px;
  color: var(--gold-light);
  margin-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding-bottom: 12px;
}
.policy-content {
  font-size: 15px;
  color: #dddddd;
  margin-bottom: 30px;
}
.policy-content h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--white);
  margin: 24px 0 10px 0;
}
.policy-content p {
  margin-bottom: 16px;
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 2px;
  transition: all 0.3s ease;
}
.btn-back:hover {
  background: var(--gold);
  color: var(--black);
}
</style>
</head>
<body>
<div class="policy-container">
  <h1>Refund Policy</h1>
  <div class="policy-content" id="policyContent">
    <p>Loading refund policy details...</p>
  </div>
  <a href="/" class="btn-back">← Back to Home</a>
</div>
<script>
async function loadPolicy() {
  try {
    const API_BASE = window.location.origin === 'null' || window.location.protocol === 'file:' ? 'http://localhost:5000' : '';
    const res = await fetch(API_BASE + '/api/legal/refund');
    const data = await res.json();
    document.getElementById('policyContent').innerHTML = data.content;
  } catch (error) {
    document.getElementById('policyContent').innerHTML = '<p style="color:red;">Error loading policy: ' + error.message + '</p>';
  }
}
loadPolicy();
</script>
</body>
</html>
